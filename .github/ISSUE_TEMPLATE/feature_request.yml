name: Feature request
description: 提议新的功能或交互改进
title: "[Feature] "
labels: ["enhancement"]
body:
  - type: textarea
    id: problem
    attributes:
      label: 想解决的问题
      description: 请先说明当前在什么场景下遇到了什么困难。
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: 建议方案
      description: 可以描述理想流程、界面位置或一个更小的可行版本。
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: 已考虑的替代方式
  - type: checkboxes
    id: privacy
    attributes:
      label: 隐私检查
      options:
        - label: 我没有在内容或截图中附上 API Key、个人风格或私人路径。
          required: true
