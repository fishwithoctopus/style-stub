name: Bug report
description: 报告界面或功能问题
title: "[Bug] "
labels: ["bug"]
body:
  - type: textarea
    id: description
    attributes:
      label: 问题描述
      description: 发生了什么？你原本期待什么？
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: 复现步骤
      placeholder: "1. 打开…\n2. 点击…\n3. 看到…"
    validations:
      required: true
  - type: input
    id: environment
    attributes:
      label: 环境
      placeholder: "Windows 11 / Style Stub 0.5.0，或浏览器名称与版本"
    validations:
      required: true
  - type: textarea
    id: notes
    attributes:
      label: 补充信息
      description: 请先移除截图或日志里的私人数据。
